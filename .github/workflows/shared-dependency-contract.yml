name: Shared dependency contract

on:
  pull_request:
  push:
    branches: [beta, main]

jobs:
  shared-dependency-contract:
    name: Verify shared dependency contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Authenticate to @redbtn registry
        env:
          REDBTN_NPM_TOKEN: ${{ secrets.REDBTN_NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/redbtn-npmrc
        run: |
          set -eu
          test -n "$REDBTN_NPM_TOKEN" || { echo 'REDBTN_NPM_TOKEN Actions secret is required.' >&2; exit 1; }
          umask 077
          {
            printf '@redbtn:registry=https://registry.redbtn.io/\n'
            printf '//registry.redbtn.io/:_authToken=%s\n' "$REDBTN_NPM_TOKEN"
            printf 'always-auth=true\n'
          } > "$NPM_CONFIG_USERCONFIG"
          NPM_CONFIG_USERCONFIG="$NPM_CONFIG_USERCONFIG" npm whoami --registry https://registry.redbtn.io/
          echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG" >> "$GITHUB_ENV"

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Revoke registry credentials
        if: always()
        run: rm -f "${NPM_CONFIG_USERCONFIG:-$RUNNER_TEMP/redbtn-npmrc}"

      - run: npm run verify:shared-dependencies
