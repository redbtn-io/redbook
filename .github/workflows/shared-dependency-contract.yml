name: Shared dependency contract

on:
  pull_request:
  push:
    branches: [beta, main]

jobs:
  shared-dependency-contract:
    name: Verify shared dependency contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run verify:shared-dependencies
